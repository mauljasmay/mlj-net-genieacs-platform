/*
 * variables.gradle - MLJ NET Android Build Configuration
 *
 * Defines SDK versions, dependency versions, and build settings
 * for the Android app. These values are referenced by the
 * build.gradle files throughout the Android project.
 *
 * IMPORTANT: Update these versions as new Android SDK versions are released.
 */

ext {
    // ─── Android SDK Versions ───────────────────────────────
    compileSdkVersion = 34    // Android 14 (API 34)
    minSdkVersion = 24        // Android 7.0 Nougat (API 24)
    targetSdkVersion = 34     // Android 14 (API 34)
    
    // ─── Build Tool Versions ────────────────────────────────
    // Use the latest stable version
    buildToolsVersion = "34.0.0"
    
    // ─── Java/Kotlin Version ────────────────────────────────
    javaVersion = JavaVersion.VERSION_17
    kotlinVersion = "1.9.22"
    
    // ─── AndroidX & Library Versions ───────────────────────
    androidxAppCompatVersion = "1.6.1"
    androidxCoreVersion = "1.12.0"
    androidxMaterialVersion = "1.11.0"
    androidxWebkitVersion = "1.10.0"
    androidxCoordinatorLayoutVersion = "1.2.0"
    androidxConstraintLayoutVersion = "2.1.4"
    androidxSwipeRefreshLayoutVersion = "1.1.0"
    androidxExifInterfaceVersion = "1.3.7"
    androidxDocumentFileVersion = "1.0.1"
    androidxLocalBroadcastManagerVersion = "1.1.0"
    
    // ─── Cordova / Capacitor Versions ──────────────────────
    cordovaAndroidVersion = "10.1.2"
    
    // ─── Application Version ───────────────────────────────
    // These are set in app/build.gradle but can be overridden here
    versionCode = 1
    versionName = "1.0.0"
}
